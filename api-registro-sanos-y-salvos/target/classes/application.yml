jwt:
  keys-path: ${JWT_KEYS_PATH:./keys/registro-jwt.pem}

eureka:
  client:
    service-url:

      defaultZone: http://admin:password123@${EUREKA_HOST:localhost}:8761/eureka
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

spring:
  application:
    name: api-registro

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres-registro}:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public