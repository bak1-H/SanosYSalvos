spring:
  application:
    name: bff-sanys
  cloud:
    openfeign:
      httpclient:
        hc5:
          enabled: true

server:
  port: 8090

logging:
  level:
    org.springframework.security: DEBUG

management:
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      # Apunta dinámicamente al contenedor de Eureka
      defaultZone: http://admin:password123@${EUREKA_HOST:localhost}:8761/eureka
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

ms:
  registro:
    url: http://${GATEWAY_HOST:localhost}:8081/api-registro-sys  # O el contexto correspondiente de tu ruteo
  reportes:
    url: http://${GATEWAY_HOST:localhost}:8081/api-reporte