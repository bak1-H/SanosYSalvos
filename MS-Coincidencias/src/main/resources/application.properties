spring.application.name=coincidencias
server.port=8082

spring.datasource.url=jdbc:postgresql://postgres:5432/fullstack_db
spring.datasource.username=postgres
spring.datasource.password=postgres

# Solo valida esquema compartido, no crea ni altera tablas
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.return_generated_keys=true

logging.level.cl.sanosysalvos.reporte=DEBUG
spring.jpa.open-in-view=false

spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest