# Configuración exclusiva para pruebas: no depende de Docker (PostgreSQL/RabbitMQ).

spring.application.name=notification-service-test

# Base de datos en memoria H2 (reemplaza a PostgreSQL durante los tests)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate sobre H2
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# No arrancar el listener de RabbitMQ ni intentar conectar al broker durante los tests
spring.rabbitmq.listener.simple.auto-startup=false

# Eureka deshabilitado en pruebas
eureka.client.enabled=false

# Nombre de la cola (necesario para resolver ${app.rabbitmq.queue})
app.rabbitmq.queue=notificaciones.queue
