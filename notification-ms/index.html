<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prueba Socket Notificaciones</title>
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f6fb;
      color: #1f2937;
      padding: 24px;
    }

    .card {
      max-width: 760px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
    }

    p {
      margin-top: 0;
      color: #4b5563;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 700;
    }

    input, button {
      font: inherit;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
    }

    input {
      width: 100%;
      max-width: 220px;
    }

    button {
      cursor: pointer;
      border: 0;
      color: #fff;
      background: #2563eb;
      margin-right: 8px;
      margin-top: 10px;
    }

    button.secondary {
      background: #6b7280;
    }

    .status {
      margin-top: 14px;
      font-weight: 700;
    }

    .hint {
      margin-top: 8px;
      font-size: 0.95rem;
      color: #6b7280;
    }

    ul {
      margin: 16px 0 0;
      padding-left: 20px;
    }

    li {
      margin-bottom: 8px;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Socket de notificaciones</h1>
    <p>Abre este archivo desde la raíz del proyecto y conéctate al servicio en Docker.</p>

    <label for="userId">ID de usuario</label>
    <input id="userId" type="number" value="1" min="1" />

    <div>
      <button id="connectBtn">Conectar</button>
      <button id="disconnectBtn" class="secondary">Desconectar</button>
      <button id="clearBtn" class="secondary">Limpiar</button>
    </div>

    <div class="status" id="status">Desconectado</div>
    <div class="hint">Endpoint: http://localhost:8081/ws-notifications</div>

    <ul id="messages"></ul>
  </div>

  <script>
    const socketUrl = (window.location.protocol === 'http:' && window.location.port === '8081')
      ? window.location.origin + '/ws-notifications'
      : 'http://localhost:8081/ws-notifications';
    let stompClient = null;
    let subscription = null;

    const messages = document.getElementById('messages');
    const status = document.getElementById('status');
    const userIdInput = document.getElementById('userId');

    function addMessage(text) {
      const li = document.createElement('li');
      li.textContent = text;
      messages.prepend(li);
    }

    function setStatus(text) {
      status.textContent = text;
    }

    function connect() {
      const userId = userIdInput.value.trim();
      if (!userId) {
        addMessage('Ingresa un ID de usuario válido.');
        return;
      }

      const socket = new SockJS(socketUrl);
      stompClient = Stomp.over(socket);
      stompClient.debug = null;

      setStatus('Conectando...');

      stompClient.connect({}, function () {
        const destination = '/topic/notifications/' + userId;
        subscription = stompClient.subscribe(destination, function (frame) {
          try {
            addMessage(JSON.stringify(JSON.parse(frame.body), null, 2));
          } catch (error) {
            addMessage(frame.body);
          }
        });

        setStatus('Conectado a ' + destination);
        addMessage('Suscrito a ' + destination);
      }, function () {
        setStatus('Error de conexión');
        addMessage('No se pudo conectar con ' + socketUrl);
      });
    }

    function disconnect() {
      if (subscription) {
        subscription.unsubscribe();
        subscription = null;
      }

      if (stompClient) {
        stompClient.disconnect();
        stompClient = null;
      }

      setStatus('Desconectado');
    }

    document.getElementById('connectBtn').addEventListener('click', connect);
    document.getElementById('disconnectBtn').addEventListener('click', disconnect);
    document.getElementById('clearBtn').addEventListener('click', function () {
      messages.innerHTML = '';
    });
  </script>
</body>
</html>
