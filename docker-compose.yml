services:
  # --- INFRAESTRUCTURA CORE ---
  eureka-server:
    build:
      context: ./discovery-service-sanos-y-salvos
      dockerfile: Dockerfile
    container_name: eureka-server
    expose:
      - "8761"
    ports:
      - "8761:8761"
    environment:
      - EUREKA_HOSTNAME=eureka-server
    networks:
      - sanos-y-salvos-net
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq-broker
    expose:
      - "5672"
    ports:
      - "15672:15672"
    networks:
      - sanos-y-salvos-net
    restart: unless-stopped

  postgres-registro:
    image: postgres:16-alpine
    container_name: postgres-registro
    expose:
      - "5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-registro-data:/var/lib/postgresql/data
      - ./api-registro-sanos-y-salvos/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sanos-y-salvos-net
    restart: unless-stopped

  # --- MICROSERVICIOS DE NEGOCIO ---
  api-registro:
    build:
      context: ./api-registro-sanos-y-salvos
      dockerfile: Dockerfile
    container_name: api-registro
    expose:
      - "8080"
    environment:
      - EUREKA_HOST=eureka-server
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    env_file:
      - .env
    volumes:
      - registro-jwt-keys:/app/keys
    depends_on:
      eureka-server:
        condition: service_started
      postgres-registro:
        condition: service_healthy
    networks:
      - sanos-y-salvos-net
    restart: unless-stopped

  api-reporte:
    build:
      context: ./MS-Reporte/MS-Reporte/reporte/reporte
      dockerfile: dockerfile
    container_name: api-reporte
    expose:
      - "8086"
    ports:
      - "8086:8086"
    environment:
      - SERVER_PORT=8086
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-registro:5432/reporte_db
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_RABBITMQ_HOST=rabbitmq
    env_file:
      - .env
    depends_on:
      postgres-registro:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      api-registro:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8086/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - sanos-y-salvos-net
    restart: unless-stopped

  ms-coincidencias:
    build:
      context: ./MS-Coincidencias
      dockerfile: Dockerfile
    container_name: ms-coincidencias
    expose:
      - "8082"
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-registro:5432/reporte_db
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      postgres-registro:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      api-reporte:
        condition: service_healthy
    networks:
      - sanos-y-salvos-net
    restart: unless-stopped

  notification-ms:
    build:
      context: ./notification-ms
      dockerfile: Dockerfile
    container_name: notification-ms
    expose:
      - "8083"
    ports:
      - "8083:8083"
    environment:
      - SERVER_PORT=8083
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-registro:5432/reporte_db
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_RABBITMQ_HOST=rabbitmq
    env_file:
      - .env
    depends_on:
      postgres-registro:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - sanos-y-salvos-net
    restart: unless-stopped

  # --- CAPA PERIMETRAL (ENTRADA Y RUTEO) ---
  api-gateway:
    build:
      context: ./api-gateway-sanos-y-salvos
      dockerfile: Dockerfile
    container_name: api-gateway
    expose:
      - "8081"
    ports:
      - "8081:8081"
    environment:
      - EUREKA_HOST=eureka-server
    depends_on:
      eureka-server:
        condition: service_started
      api-registro:
        condition: service_started
    networks:
      - sanos-y-salvos-net
    restart: unless-stopped

  bff-sanys:
    build:
      context: ./bff-sanos-y-salvos
      dockerfile: Dockerfile
    container_name: bff-sanys
    expose:
      - "8090"
    ports:
      - "8090:8090"
    environment:
      - EUREKA_HOST=eureka-server
      - GATEWAY_HOST=api-gateway
    env_file:
      - .env
    depends_on:
      eureka-server:
        condition: service_started
      api-gateway:
        condition: service_started
      api-registro:
        condition: service_started
    networks:
      - sanos-y-salvos-net
    restart: unless-stopped

  # --- FRONTEND ---
  front:
    build:
      context: ./front-sanos-y-salvos
      dockerfile: Dockerfile
    container_name: front-sanys
    ports:
      - "5173:80"
    depends_on:
      bff-sanys:
        condition: service_started
    networks:
      - sanos-y-salvos-net
    restart: unless-stopped

networks:
  sanos-y-salvos-net:
    driver: bridge

volumes:
  postgres-registro-data:
  registro-jwt-keys:
