spring.application.name=reporte

server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://postgres:5432/coincidencias
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.return_generated_keys=true

# RabbitMQ
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

logging.level.root=INFO
logging.level.cl.sanosysalvos.reporte=DEBUG

spring.jpa.open-in-view=false

# Actuator (healthcheck para docker-compose depends_on)
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true